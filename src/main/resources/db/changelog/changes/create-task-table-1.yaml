databaseChangeLog:
  - changeSet:
      id: create-task-table-1
      author: task-api
      changes:
        - createTable:
            tableName: task
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_task
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(1000)
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

  - changeSet:
      id: task-filter-indexes-2
      author: task-api
      changes:
        - createIndex:
            tableName: task
            indexName: idx_task_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: task
            indexName: idx_task_priority
            columns:
              - column:
                  name: priority

  - changeSet:
      id: add-version-column-3
      author: task-api
      changes:
        - addColumn:
            tableName: task
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false